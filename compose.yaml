# Postgres used by the test suite. Brought up/down automatically by vitest's
# globalSetup (tests/support/global-setup.ts), so local and CI share one env.
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    # Host port 5433 (not the default 5432) to avoid clashing with a Postgres a
    # developer may already run locally. Override with the host side if needed.
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 1s
      timeout: 5s
      retries: 30
